# colemak specific binds
# bind = $mainMod, H, movefocus, l
bind = $mainMod, H, exec, ~/.config/hyrp/move.sh switch l
# bind = $mainMod, I, movefocus, r
bind = $mainMod, H, exec, ~/.config/hyrp/move.sh switch r
bind = $mainMod, E, movefocus, u
bind = $mainMod, N, movefocus, d

bind = $mainMod_SHIFT, H, movewindoworgroup, l
bind = $mainMod_SHIFT, I, movewindoworgroup, r
bind = $mainMod_SHIFT, E, movewindow, u
bind = $mainMod_SHIFT, N, movewindow, d
