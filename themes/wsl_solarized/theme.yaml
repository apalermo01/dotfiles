nvim:
  colorscheme: solarized
  overwrite:
    - src: theme.lua
      dst: nvim/lua/config/theme.lua
tmux:
  append:
    - src: tmux.conf
      dst: tmux/tmux.conf
zsh:
  feats: [fastfetch]
  env:
    NOTES_PATH: "/mnt/c/Users/apalermo/github/notes/"
  append:
    - src: additions.zsh
      dst: zsh/.zshrc
  overwrite:
    - src: solarized-powerline.zsh-theme
      dst: zsh/solarized-powerline.zsh-theme
fastfetch:
  overwrite:
    - src: config.jsonc
      dst: fastfetch/config.jsonc
